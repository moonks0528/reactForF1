<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로또 번호 추천기</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --header-bg: #222;
      --header-color: #ffffff;
      --text: #111111;
      --card-bg: #ffffff;
      --toggle-bg: #444;
      --toggle-color: #ffffff;
    }

    [data-theme="dark"] {
      --bg: #1a1a2e;
      --header-bg: #0f0f1a;
      --header-color: #e0e0e0;
      --text: #e0e0e0;
      --card-bg: #16213e;
      --toggle-bg: #e0e0e0;
      --toggle-color: #1a1a2e;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }

    header {
      background: var(--header-bg);
      color: var(--header-color);
      padding: 40px 20px 20px;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 16px;
      right: 20px;
      padding: 8px 16px;
      font-size: 14px;
      border: none;
      border-radius: 20px;
      background: var(--toggle-bg);
      color: var(--toggle-color);
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      margin-top: 40px;
    }

    button.generate-btn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #0077cc;
      color: white;
      cursor: pointer;
    }

    button.generate-btn:hover {
      background: #005fa3;
    }

    .set {
      margin-top: 20px;
    }

    .ball {
      display: inline-block;
      width: 45px;
      height: 45px;
      line-height: 45px;
      margin: 5px;
      border-radius: 50%;
      color: white;
      font-weight: bold;
    }

    .bonus {
      border: 3px solid #000;
    }

    label {
      font-size: 16px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <header>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 다크모드</button>
    <h1>🎯 로또 번호 추천기</h1>
    <p>버튼을 눌러 5세트 번호를 받아보세요</p>
  </header>

  <div class="container">
    <button class="generate-btn" onclick="generateLotto()">번호 추천 받기</button>
    <br><br>
    <input type="checkbox" id="bonusCheck">
    <label for="bonusCheck">보너스 번호 포함</label>

    <div id="result"></div>
  </div>

  <script>
    const btn = document.getElementById("themeBtn");

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      btn.textContent = theme === "dark" ? "☀️ 라이트모드" : "🌙 다크모드";
      localStorage.setItem("theme", theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme");
      applyTheme(current === "dark" ? "light" : "dark");
    }

    const saved = localStorage.getItem("theme") || "light";
    applyTheme(saved);

    function getRandomColor() {
      return `rgb(${Math.floor(Math.random()*256)},
                  ${Math.floor(Math.random()*256)},
                  ${Math.floor(Math.random()*256)})`;
    }

    function getNumbers(count, exclude=[]) {
      let nums = [];

      while (nums.length < count) {
        let n = Math.floor(Math.random() * 45) + 1;
        if (!nums.includes(n) && !exclude.includes(n)) {
          nums.push(n);
        }
      }

      return nums.sort((a,b) => a-b);
    }

    function generateLotto() {
      const result = document.getElementById("result");
      result.innerHTML = "";

      const includeBonus = document.getElementById("bonusCheck").checked;

      for (let i = 0; i < 5; i++) {
        let setDiv = document.createElement("div");
        setDiv.className = "set";

        let mainNums = getNumbers(6);

        mainNums.forEach(n => {
          let span = document.createElement("span");
          span.className = "ball";
          span.textContent = n;
          span.style.backgroundColor = getRandomColor();
          setDiv.appendChild(span);
        });

        if (includeBonus) {
          let bonusNum = getNumbers(1, mainNums)[0];

          let bonusSpan = document.createElement("span");
          bonusSpan.className = "ball bonus";
          bonusSpan.textContent = bonusNum;
          bonusSpan.style.backgroundColor = getRandomColor();

          setDiv.appendChild(document.createTextNode(" + "));
          setDiv.appendChild(bonusSpan);
        }

        result.appendChild(setDiv);
      }
    }
  </script>

</body>
</html>

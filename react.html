<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>F1 반응속도 테스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial', sans-serif;
      background: #0d0d0d;
      color: white;
      min-height: 100vh;
    }

    header {
      padding: 24px 40px;
      background: #b00020;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header p {
      font-size: 13px;
      opacity: 0.8;
      margin-left: auto;
    }

    .layout {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      padding: 40px 24px;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── 게임 패널 ── */
    .game-panel {
      flex: 1;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .lights {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .light {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #2a2a2a;
      border: 3px solid #3a3a3a;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .red   { background: #e00; box-shadow: 0 0 18px #e00; }
    .green { background: #0d0; box-shadow: 0 0 22px #0d0; }

    #mainBtn {
      padding: 16px 52px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #e8e8e8;
      color: #111;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 28px;
    }

    #mainBtn:hover  { background: #fff; }
    #mainBtn:active { transform: scale(0.97); }

    #message {
      font-size: 22px;
      font-weight: 700;
      min-height: 32px;
      color: #f0f0f0;
      margin-bottom: 14px;
      text-align: center;
    }

    #record {
      font-size: 14px;
      color: #666;
    }

    #best { color: #f1c40f; font-weight: 700; }

    /* ── 기록 패널 ── */
    .history-panel {
      width: 210px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .history-panel h2 {
      font-size: 14px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-bottom: 14px;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 14px;
    }

    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .history-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      background: #222;
      font-size: 14px;
      color: #bbb;
    }

    .history-list li .rank { color: #555; font-size: 12px; }

    .history-list li.best       { background: #2a2400; }
    .history-list li.best .time { color: #f1c40f; font-weight: 700; }

    .history-list li.false-start       { background: #2a0f0f; }
    .history-list li.false-start .time { color: #e74c3c; font-size: 12px; }

    .history-empty {
      color: #444;
      font-size: 13px;
      text-align: center;
      padding: 20px 0;
    }

    .clear-btn {
      margin-top: 16px;
      width: 100%;
      padding: 9px;
      font-size: 12px;
      font-weight: 600;
      background: #222;
      color: #555;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s, color 0.15s;
    }

    .clear-btn:hover { background: #2e2e2e; color: #aaa; }
  </style>
</head>
<body>

  <header>
    <h1>🏎️ F1 반응속도 테스트</h1>
    <p>불이 꺼지는 순간 최대한 빠르게 클릭하세요</p>
  </header>

  <div class="layout">

    <div class="game-panel">
      <div class="lights">
        <div class="light" id="l1"></div>
        <div class="light" id="l2"></div>
        <div class="light" id="l3"></div>
        <div class="light" id="l4"></div>
        <div class="light" id="l5"></div>
      </div>

      <button id="mainBtn" onclick="handleClick()">START</button>

      <div id="message">START 버튼을 눌러 시작하세요.</div>
      <div id="record">최고 기록: <span id="best">없음</span></div>
    </div>

    <div class="history-panel">
      <h2>기록 리스트</h2>
      <ul class="history-list" id="historyList"></ul>
      <p class="history-empty" id="historyEmpty">아직 기록이 없습니다.</p>
      <button class="clear-btn" onclick="clearHistory()">기록 초기화</button>
    </div>

  </div>

  <script>
    let state = "ready";
    let startTime = 0;
    let timer = null;
    let bestRecord = localStorage.getItem("f1Best");
    let history = JSON.parse(localStorage.getItem("f1History") || "[]");

    const lights = [
      document.getElementById("l1"),
      document.getElementById("l2"),
      document.getElementById("l3"),
      document.getElementById("l4"),
      document.getElementById("l5")
    ];

    const mainBtn  = document.getElementById("mainBtn");
    const message  = document.getElementById("message");
    const best     = document.getElementById("best");

    if (bestRecord) best.textContent = bestRecord + "ms";

    renderHistory();

    function renderHistory() {
      const list  = document.getElementById("historyList");
      const empty = document.getElementById("historyEmpty");

      list.innerHTML = "";

      if (history.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";
      const minTime = Math.min(...history.filter(r => r.type === "normal").map(r => r.time));

      history.slice().reverse().forEach((entry, i) => {
        const li   = document.createElement("li");
        const rank = document.createElement("span");
        rank.className   = "rank";
        rank.textContent = "#" + (history.length - i);

        const time = document.createElement("span");
        time.className = "time";

        if (entry.type === "false") {
          li.classList.add("false-start");
          time.textContent = "플라잉";
        } else {
          time.textContent = entry.time + "ms";
          if (entry.time === minTime) li.classList.add("best");
        }

        li.appendChild(rank);
        li.appendChild(time);
        list.appendChild(li);
      });
    }

    function addHistory(entry) {
      history.push(entry);
      localStorage.setItem("f1History", JSON.stringify(history));
      renderHistory();
    }

    function clearHistory() {
      history = [];
      bestRecord = null;
      localStorage.removeItem("f1History");
      localStorage.removeItem("f1Best");
      best.textContent = "없음";
      renderHistory();
    }

    function handleClick() {
      if      (state === "ready")   startGame();
      else if (state === "waiting") falseStart();
      else if (state === "go")      checkReaction();
    }

    function startGame() {
      state = "waiting";
      mainBtn.textContent  = "WAIT...";
      message.textContent  = "빨간불이 꺼질 때까지 기다리세요.";

      lights.forEach(l => l.className = "light");

      let count = 0;
      const lightInterval = setInterval(() => {
        lights[count].classList.add("red");
        count++;

        if (count === lights.length) {
          clearInterval(lightInterval);
          const delay = Math.floor(Math.random() * 3000) + 1000;

          timer = setTimeout(() => {
            lights.forEach(l => l.className = "light");
            state = "go";
            startTime = Date.now();
            mainBtn.textContent = "CLICK!";
            message.textContent = "지금 클릭!";
          }, delay);
        }
      }, 700);
    }

    function falseStart() {
      clearTimeout(timer);
      state = "ready";

      lights.forEach(l => { l.className = "light"; l.classList.add("red"); });

      mainBtn.textContent = "RESTART";
      message.textContent = "❌ 플라잉 스타트! 너무 빨리 눌렀습니다.";
      addHistory({ type: "false" });
    }

    function checkReaction() {
      const reactionTime = Date.now() - startTime;
      state = "ready";
      mainBtn.textContent = "RESTART";

      lights.forEach(l => { l.className = "light"; l.classList.add("green"); });

      message.textContent = "반응속도: " + reactionTime + "ms";
      addHistory({ type: "normal", time: reactionTime });

      if (!bestRecord || reactionTime < bestRecord) {
        bestRecord = reactionTime;
        localStorage.setItem("f1Best", bestRecord);
        best.textContent    = bestRecord + "ms";
        message.textContent += " 🎉 신기록!";
      }
    }
  </script>

</body>
</html>

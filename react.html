<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>F1 반응속도 테스트</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      background: #b00020;
    }

    .container {
      margin-top: 50px;
    }

    .lights {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 40px 0;
    }

    .light {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #333;
      border: 4px solid #555;
    }

    .red {
      background: red;
      box-shadow: 0 0 20px red;
    }

    .green {
      background: lime;
      box-shadow: 0 0 25px lime;
    }

    button {
      padding: 18px 35px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #ffffff;
      color: #111;
      font-weight: bold;
    }

    button:hover {
      background: #ddd;
    }

    #message {
      margin-top: 30px;
      font-size: 28px;
      font-weight: bold;
    }

    #record {
      margin-top: 15px;
      font-size: 20px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <header>
    <h1>🏎️ F1 출발 반응속도 테스트</h1>
    <p>불이 꺼지는 순간 최대한 빠르게 클릭하세요!</p>
  </header>

  <div class="container">
    <div class="lights">
      <div class="light" id="l1"></div>
      <div class="light" id="l2"></div>
      <div class="light" id="l3"></div>
      <div class="light" id="l4"></div>
      <div class="light" id="l5"></div>
    </div>

    <button id="mainBtn" onclick="handleClick()">START</button>

    <div id="message">START 버튼을 눌러 시작하세요.</div>
    <div id="record">최고 기록: <span id="best">없음</span></div>
  </div>

  <script>
    let state = "ready";
    let startTime = 0;
    let timer = null;
    let bestRecord = localStorage.getItem("f1Best");

    const lights = [
      document.getElementById("l1"),
      document.getElementById("l2"),
      document.getElementById("l3"),
      document.getElementById("l4"),
      document.getElementById("l5")
    ];

    const mainBtn = document.getElementById("mainBtn");
    const message = document.getElementById("message");
    const best = document.getElementById("best");

    if (bestRecord) {
      best.textContent = bestRecord + "ms";
    }

    function handleClick() {
      if (state === "ready") {
        startGame();
      } 
      else if (state === "waiting") {
        falseStart();
      } 
      else if (state === "go") {
        checkReaction();
      }
    }

    function startGame() {
      state = "waiting";
      mainBtn.textContent = "WAIT...";
      message.textContent = "빨간불이 꺼질 때까지 기다리세요.";

      lights.forEach(light => {
        light.className = "light";
      });

      let count = 0;

      const lightInterval = setInterval(() => {
        lights[count].classList.add("red");
        count++;

        if (count === lights.length) {
          clearInterval(lightInterval);

          const randomDelay = Math.floor(Math.random() * 3000) + 1000;

          timer = setTimeout(() => {
            lights.forEach(light => {
              light.className = "light";
            });

            state = "go";
            startTime = Date.now();
            mainBtn.textContent = "CLICK!";
            message.textContent = "지금 클릭!";
          }, randomDelay);
        }
      }, 700);
    }

    function falseStart() {
      clearTimeout(timer);
      state = "ready";

      lights.forEach(light => {
        light.className = "light";
        light.classList.add("red");
      });

      mainBtn.textContent = "RESTART";
      message.textContent = "❌ 플라잉 스타트! 너무 빨리 눌렀습니다.";
    }

    function checkReaction() {
      const reactionTime = Date.now() - startTime;

      state = "ready";
      mainBtn.textContent = "RESTART";

      lights.forEach(light => {
        light.className = "light";
        light.classList.add("green");
      });

      message.textContent = "반응속도: " + reactionTime + "ms";

      if (!bestRecord || reactionTime < bestRecord) {
        bestRecord = reactionTime;
        localStorage.setItem("f1Best", bestRecord);
        best.textContent = bestRecord + "ms";
        message.textContent += " 🎉 신기록!";
      }
    }
  </script>

</body>
</html>
